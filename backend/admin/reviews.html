<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews - Admin | Animal Mart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <a class="sidebar-brand" href="dashboard.html">
            <i class="bi bi-shop-window" style="font-size:1.8rem; color:#818cf8;"></i>
            <h5>Animal Mart</h5>
        </a>
        <div class="sidebar-nav">
            <div class="nav-section-label">Main</div>
            <a class="sidebar-link" href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a class="sidebar-link" href="animals.html"><i class="bi bi-basket3-fill"></i> Animals</a>
            <a class="sidebar-link" href="orders.html"><i class="bi bi-bag-check-fill"></i> Orders</a>
            <div class="nav-section-label">Users</div>
            <a class="sidebar-link" href="users.html"><i class="bi bi-people-fill"></i> Users</a>
            <a class="sidebar-link active" href="reviews.html"><i class="bi bi-chat-square-text-fill"></i> Reviews</a>
            <div class="nav-section-label">System</div>
            <a class="sidebar-link" href="../../frontend/index.html" target="_blank"><i class="bi bi-globe2"></i> View Site</a>
            <a class="sidebar-link" href="#" onclick="adminLogout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="admin-main">
        <div class="admin-header">
            <h4><i class="bi bi-chat-square-text-fill me-2 text-primary"></i>Review Management</h4>
            <input type="text" class="admin-search" id="search-reviews" placeholder="Search reviews..." oninput="filterReviews()">
        </div>

        <div class="admin-content">
            <div class="admin-table-wrap">
                <div class="admin-table-header">
                    <h5>All Reviews (<span id="reviews-count">0</span>)</h5>
                </div>
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Reviewer</th>
                                <th>Animal</th>
                                <th>Rating</th>
                                <th>Comment</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="reviews-tbody">
                            <tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8;">Loading reviews...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        let allReviews = [];

        document.addEventListener('DOMContentLoaded', loadReviews);

        async function loadReviews() {
            const res = await adminFetch('admin.php?action=reviews');
            if (res && res.status === 'success') {
                allReviews = res.reviews;
                document.getElementById('reviews-count').innerText = allReviews.length;
                renderReviewsTable(allReviews);
            }
        }

        function renderReviewsTable(reviews) {
            const tbody = document.getElementById('reviews-tbody');
            tbody.innerHTML = '';
            if (reviews.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8;">No reviews found.</td></tr>`;
                return;
            }
            reviews.forEach(r => {
                const stars = '⭐'.repeat(r.rating);
                const comment = r.comment ? r.comment.substring(0, 60) + (r.comment.length > 60 ? '...' : '') : '—';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${r.id}</td>
                    <td><strong>${r.reviewer_name}</strong></td>
                    <td>${r.animal_name || '—'}</td>
                    <td>${stars}</td>
                    <td style="max-width:200px; word-wrap:break-word;">${comment}</td>
                    <td><span class="badge-pill badge-${r.status}">${r.status.toUpperCase()}</span></td>
                    <td>${new Date(r.created_at).toLocaleDateString()}</td>
                    <td style="display:flex;gap:6px;flex-wrap:wrap;">
                        ${r.status !== 'approved' ? `<button class="btn-action btn-approve" onclick="updateReviewStatus(${r.id}, 'approved')"><i class="bi bi-check2"></i> Approve</button>` : ''}
                        ${r.status !== 'rejected' ? `<button class="btn-action btn-ban" onclick="updateReviewStatus(${r.id}, 'rejected')"><i class="bi bi-x-circle"></i> Reject</button>` : ''}
                        <button class="btn-action btn-delete" onclick="deleteReview(${r.id})"><i class="bi bi-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateReviewStatus(id, status) {
            const res = await adminFetch('admin.php', {
                method: 'POST',
                body: JSON.stringify({ action: 'update_review_status', review_id: id, status })
            });
            if (res && res.status === 'success') {
                adminToast(`Review ${status}.`, 'success');
                loadReviews();
            } else {
                adminToast('Update failed.', 'error');
            }
        }

        async function deleteReview(id) {
            if (!confirm('Permanently delete this review?')) return;
            const res = await adminFetch('admin.php', {
                method: 'POST',
                body: JSON.stringify({ action: 'delete_review', review_id: id })
            });
            if (res && res.status === 'success') {
                adminToast('Review deleted.', 'success');
                loadReviews();
            } else {
                adminToast('Delete failed.', 'error');
            }
        }

        function filterReviews() {
            const q = document.getElementById('search-reviews').value.toLowerCase();
            const filtered = allReviews.filter(r =>
                (r.reviewer_name || '').toLowerCase().includes(q) ||
                (r.animal_name || '').toLowerCase().includes(q) ||
                (r.comment || '').toLowerCase().includes(q)
            );
            renderReviewsTable(filtered);
        }

        function adminLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../../frontend/login.html';
        }
    </script>
</body>
</html>
