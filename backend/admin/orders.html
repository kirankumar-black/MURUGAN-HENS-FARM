<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Admin | Animal Mart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <a class="sidebar-brand" href="dashboard.html">
            <i class="bi bi-shop-window" style="font-size:1.8rem; color:#818cf8;"></i>
            <h5>Animal Mart</h5>
        </a>
        <div class="sidebar-nav">
            <div class="nav-section-label">Main</div>
            <a class="sidebar-link" href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a class="sidebar-link" href="animals.html"><i class="bi bi-basket3-fill"></i> Animals</a>
            <a class="sidebar-link active" href="orders.html"><i class="bi bi-bag-check-fill"></i> Orders</a>
            <div class="nav-section-label">Users</div>
            <a class="sidebar-link" href="users.html"><i class="bi bi-people-fill"></i> Users</a>
            <a class="sidebar-link" href="reviews.html"><i class="bi bi-chat-square-text-fill"></i> Reviews</a>
            <div class="nav-section-label">System</div>
            <a class="sidebar-link" href="../../frontend/index.html" target="_blank"><i class="bi bi-globe2"></i> View Site</a>
            <a class="sidebar-link" href="#" onclick="adminLogout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="admin-main">
        <div class="admin-header">
            <h4><i class="bi bi-bag-check-fill me-2 text-primary"></i>Order Management</h4>
            <input type="text" class="admin-search" id="search-orders" placeholder="Search by buyer / order ID..." oninput="filterOrders()">
        </div>

        <div class="admin-content">

            <!-- Update Status Modal (inline) -->
            <div id="update-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center;">
                <div style="background:white; border-radius:20px; padding:32px; width:400px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.2);">
                    <h5 style="font-weight:700; margin-bottom:20px;">Update Order Status</h5>
                    <input type="hidden" id="modal-order-id">
                    <div style="margin-bottom:16px;">
                        <label style="font-size:0.9rem; font-weight:600; display:block; margin-bottom:6px;">New Status</label>
                        <select id="modal-status" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;font-size:0.92rem;">
                            <option value="pending">Pending</option>
                            <option value="processing">Processing</option>
                            <option value="shipped">Shipped</option>
                            <option value="delivered">Delivered</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div style="margin-bottom:20px;">
                        <label style="font-size:0.9rem; font-weight:600; display:block; margin-bottom:6px;">Tracking Number (optional)</label>
                        <input type="text" id="modal-tracking" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;font-size:0.92rem;" placeholder="e.g. TRK123456">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="saveOrderStatus()" style="flex:1;padding:12px;background:#4f46e5;color:white;border:none;border-radius:10px;font-weight:600;cursor:pointer;">Save Changes</button>
                        <button onclick="closeModal()" style="flex:1;padding:12px;background:#f1f5f9;color:#475569;border:none;border-radius:10px;font-weight:600;cursor:pointer;">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="admin-table-wrap">
                <div class="admin-table-header">
                    <h5>All Orders (<span id="orders-count">0</span>)</h5>
                </div>
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Buyer</th>
                                <th>Amount</th>
                                <th>Method</th>
                                <th>Payment</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8;">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        let allOrders = [];

        document.addEventListener('DOMContentLoaded', loadOrders);

        async function loadOrders() {
            const res = await adminFetch('admin.php?action=orders');
            if (res && res.status === 'success') {
                allOrders = res.orders;
                document.getElementById('orders-count').innerText = allOrders.length;
                renderOrdersTable(allOrders);
            }
        }

        function renderOrdersTable(orders) {
            const tbody = document.getElementById('orders-tbody');
            tbody.innerHTML = '';
            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:30px;color:#94a3b8;">No orders found.</td></tr>`;
                return;
            }
            orders.forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>#${o.id}</strong></td>
                    <td>${o.buyer_name || 'Guest'}</td>
                    <td>${adminFormatPrice(o.total_amount)}</td>
                    <td>${o.payment_method}</td>
                    <td><span class="badge-pill ${o.payment_status === 'paid' ? 'badge-approved' : 'badge-pending'}">${o.payment_status.toUpperCase()}</span></td>
                    <td><span class="badge-pill badge-${o.status}">${o.status.toUpperCase()}</span></td>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-action btn-view" onclick="openUpdateModal(${o.id}, '${o.status}')">
                            <i class="bi bi-pencil-square"></i> Update
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openUpdateModal(orderId, currentStatus) {
            document.getElementById('modal-order-id').value = orderId;
            document.getElementById('modal-status').value = currentStatus;
            document.getElementById('modal-tracking').value = '';
            document.getElementById('update-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('update-modal').style.display = 'none';
        }

        async function saveOrderStatus() {
            const id = document.getElementById('modal-order-id').value;
            const status = document.getElementById('modal-status').value;
            const tracking = document.getElementById('modal-tracking').value;

            const payload = { action: 'update_order_status', order_id: id, status };
            if (tracking) payload.tracking_number = tracking;

            const res = await adminFetch('admin.php', {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if (res && res.status === 'success') {
                adminToast('Order status updated.', 'success');
                closeModal();
                loadOrders();
            } else {
                adminToast(res?.message || 'Update failed.', 'error');
            }
        }

        function filterOrders() {
            const q = document.getElementById('search-orders').value.toLowerCase();
            const filtered = allOrders.filter(o =>
                String(o.id).includes(q) ||
                (o.buyer_name || '').toLowerCase().includes(q)
            );
            renderOrdersTable(filtered);
        }

        function adminLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../../frontend/login.html';
        }
    </script>
</body>
</html>
