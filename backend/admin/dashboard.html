<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Animal Mart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
        <a class="sidebar-brand" href="dashboard.html">
            <i class="bi bi-shop-window" style="font-size:1.8rem; color:#818cf8;"></i>
            <h5>Animal Mart</h5>
        </a>
        <div class="sidebar-nav">
            <div class="nav-section-label">Main</div>
            <a class="sidebar-link active" href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a class="sidebar-link" href="animals.html"><i class="bi bi-basket3-fill"></i> Animals</a>
            <a class="sidebar-link" href="orders.html"><i class="bi bi-bag-check-fill"></i> Orders</a>
            <div class="nav-section-label">Users</div>
            <a class="sidebar-link" href="users.html"><i class="bi bi-people-fill"></i> Users</a>
            <a class="sidebar-link" href="reviews.html"><i class="bi bi-chat-square-text-fill"></i> Reviews</a>
            <div class="nav-section-label">System</div>
            <a class="sidebar-link" href="../../frontend/index.html" target="_blank"><i class="bi bi-globe2"></i> View Site</a>
            <a class="sidebar-link" href="#" onclick="adminLogout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="admin-main">
        <div class="admin-header">
            <h4><i class="bi bi-grid-1x2-fill me-2 text-primary"></i>Dashboard Overview</h4>
            <div class="d-flex align-items-center gap-3">
                <span style="font-size:0.85rem; color:#64748b;" id="admin-welcome">Welcome, Admin</span>
                <i class="bi bi-bell-fill" style="color:#64748b; font-size:1.2rem; cursor:pointer;"></i>
            </div>
        </div>

        <div class="admin-content">

            <!-- Metric Cards Row -->
            <div class="row g-4 mb-5">
                <div class="col-sm-6 col-xl-3">
                    <div class="metric-card">
                        <div>
                            <div class="metric-label">Total Users</div>
                            <div class="metric-number" id="stat-users">—</div>
                        </div>
                        <div class="metric-icon" style="background: linear-gradient(135deg,#4f46e5,#818cf8);">
                            <i class="bi bi-people-fill"></i>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="metric-card">
                        <div>
                            <div class="metric-label">Total Orders</div>
                            <div class="metric-number" id="stat-orders">—</div>
                        </div>
                        <div class="metric-icon" style="background: linear-gradient(135deg,#10b981,#34d399);">
                            <i class="bi bi-bag-check-fill"></i>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="metric-card">
                        <div>
                            <div class="metric-label">Total Sales</div>
                            <div class="metric-number" id="stat-sales" style="font-size:1.5rem;">—</div>
                        </div>
                        <div class="metric-icon" style="background: linear-gradient(135deg,#f59e0b,#fbbf24);">
                            <i class="bi bi-currency-rupee"></i>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="metric-card">
                        <div>
                            <div class="metric-label">Active Listings</div>
                            <div class="metric-number" id="stat-animals">—</div>
                        </div>
                        <div class="metric-icon" style="background: linear-gradient(135deg,#ef4444,#f87171);">
                            <i class="bi bi-basket3-fill"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="row g-4 mb-5">
                <div class="col-lg-8">
                    <div class="chart-wrap">
                        <h5 class="fw-bold mb-4">Daily Sales (Last 7 Days)</h5>
                        <canvas id="salesChart" height="100"></canvas>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="chart-wrap">
                        <h5 class="fw-bold mb-4">Sales by Category</h5>
                        <canvas id="categoryChart" height="220"></canvas>
                    </div>
                </div>
            </div>

            <!-- Order Status Breakdown -->
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="admin-table-wrap">
                        <div class="admin-table-header">
                            <h5>Order Status Breakdown</h5>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Status</th>
                                    <th>Count</th>
                                </tr>
                            </thead>
                            <tbody id="order-status-tbody">
                                <tr><td colspan="2" style="text-align:center; padding:20px; color:#94a3b8;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="chart-wrap h-100">
                        <h5 class="fw-bold mb-4">Orders Distribution</h5>
                        <canvas id="orderDonutChart" height="200"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Greet admin
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.username) {
                document.getElementById('admin-welcome').innerText = `Welcome, ${user.username}`;
            }

            // Fetch stats
            const statsRes = await adminFetch('admin.php?action=stats');
            if (statsRes && statsRes.status === 'success') {
                const s = statsRes.stats;
                document.getElementById('stat-users').innerText = s.total_users.toLocaleString();
                document.getElementById('stat-orders').innerText = s.total_orders.toLocaleString();
                document.getElementById('stat-sales').innerText = adminFormatPrice(s.total_sales);
                document.getElementById('stat-animals').innerText = s.active_listings.toLocaleString();

                // Order status table
                const tbody = document.getElementById('order-status-tbody');
                tbody.innerHTML = '';
                if (s.order_statuses.length > 0) {
                    s.order_statuses.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><span class="badge-pill badge-${row.status}">${row.status.toUpperCase()}</span></td>
                            <td><strong>${row.count}</strong></td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center;padding:20px;color:#94a3b8;">No orders yet.</td></tr>`;
                }

                // Donut chart — order statuses
                const donutLabels = s.order_statuses.map(r => r.status);
                const donutData = s.order_statuses.map(r => r.count);
                const donutColors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#6366f1'];
                new Chart(document.getElementById('orderDonutChart'), {
                    type: 'doughnut',
                    data: {
                        labels: donutLabels,
                        datasets: [{ data: donutData, backgroundColor: donutColors, borderWidth: 0 }]
                    },
                    options: { plugins: { legend: { position: 'bottom' } } }
                });
            }

            // Fetch chart data
            const chartsRes = await adminFetch('admin.php?action=charts');
            if (chartsRes && chartsRes.status === 'success') {
                const c = chartsRes.charts;

                // Daily sales line chart
                const dailyLabels = c.daily_sales.map(d => d.date);
                const dailySalesData = c.daily_sales.map(d => parseFloat(d.sales));
                new Chart(document.getElementById('salesChart'), {
                    type: 'bar',
                    data: {
                        labels: dailyLabels.length ? dailyLabels : ['No data'],
                        datasets: [{
                            label: 'Revenue (₹)',
                            data: dailySalesData.length ? dailySalesData : [0],
                            backgroundColor: 'rgba(79,70,229,0.15)',
                            borderColor: '#4f46e5',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

                // Category pie chart
                const catLabels = c.category_sales.map(c => c.category);
                const catData = c.category_sales.map(c => parseFloat(c.sales));
                const catColors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#ec4899','#84cc16','#f97316','#0ea5e9'];
                new Chart(document.getElementById('categoryChart'), {
                    type: 'pie',
                    data: {
                        labels: catLabels.length ? catLabels : ['No data'],
                        datasets: [{
                            data: catData.length ? catData : [1],
                            backgroundColor: catColors,
                            borderWidth: 0
                        }]
                    },
                    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
                });
            }
        });

        function adminLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../../frontend/login.html';
        }
    </script>
</body>
</html>
