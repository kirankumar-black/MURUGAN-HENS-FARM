<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Animal Mart</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-primary" href="index.html">
                <i class="bi bi-shop" style="font-size: 1.8rem;"></i>
                <span>Animal Mart</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="animals.html">Animals</a></li>
                    <li class="nav-item position-relative">
                        <a class="nav-link" href="cart.html">
                            <i class="bi bi-cart3 fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="cart-badge">0</span>
                        </a>
                    </li>
                    <li class="nav-item ms-2">
                        <select class="form-select form-select-sm bg-transparent text-color border-secondary rounded-3" id="lang-selector" style="font-size: 0.85rem;">
                            <option value="en">English</option>
                            <option value="ta">தமிழ்</option>
                        </select>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-sm btn-link text-color" id="theme-toggle-btn" aria-label="Toggle Theme">
                            <i class="bi bi-moon-stars-fill"></i>
                        </button>
                    </li>
                    <li class="nav-item"><a class="btn btn-danger btn-sm rounded-pill px-3" href="#" id="nav-logout-btn">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Dashboard Layout -->
    <div class="container py-5">
        <div class="row g-4">
            
            <!-- Sidebar Panel Options -->
            <div class="col-lg-3">
                <div class="glass-card p-4" style="border: 1px solid var(--border-color); border-radius: 20px;">
                    <div class="text-center mb-4 pb-3 border-bottom border-secondary">
                        <i class="bi bi-person-bounding-box text-primary display-5 mb-2 d-block"></i>
                        <h5 class="fw-bold m-0" id="dash-side-name">User Name</h5>
                        <small class="text-muted text-uppercase" id="dash-side-role">Role</small>
                    </div>

                    <div class="nav flex-column nav-pills gap-2" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                        <button class="nav-link active text-start py-2.5 rounded-3" id="tab-dashboard" data-bs-toggle="pill" data-bs-target="#panel-dashboard" type="button" role="tab"><i class="bi bi-grid-1x2-fill me-2"></i>Overview</button>
                        <button class="nav-link text-start py-2.5 rounded-3" id="tab-profile" data-bs-toggle="pill" data-bs-target="#panel-profile" type="button" role="tab"><i class="bi bi-person-fill me-2"></i>Edit Profile</button>
                        <button class="nav-link text-start py-2.5 rounded-3" id="tab-orders" data-bs-toggle="pill" data-bs-target="#panel-orders" type="button" role="tab"><i class="bi bi-bag-check-fill me-2"></i>Order History</button>
                        <button class="nav-link text-start py-2.5 rounded-3" id="tab-wishlist" data-bs-toggle="pill" data-bs-target="#panel-wishlist" type="button" role="tab"><i class="bi bi-heart-fill me-2"></i>Wishlist</button>
                        <button class="nav-link text-start py-2.5 rounded-3 d-none" id="tab-seller" data-bs-toggle="pill" data-bs-target="#panel-seller" type="button" role="tab"><i class="bi bi-shop-window me-2"></i>Seller Panel</button>
                    </div>
                </div>
            </div>

            <!-- Content Panel Display -->
            <div class="col-lg-9">
                <div class="tab-content" id="v-pills-tabContent">
                    
                    <!-- Tab: Overview -->
                    <div class="tab-pane fade show active" id="panel-dashboard" role="tabpanel">
                        <h3 class="fw-bold mb-4">Account Overview</h3>
                        <div class="row g-3 mb-4">
                            <div class="col-sm-6 col-md-4">
                                <div class="glass-card p-4 text-center" style="border: 1px solid var(--border-color); border-radius: 16px;">
                                    <i class="bi bi-box2-fill text-primary fs-2 mb-2 d-block"></i>
                                    <h6 class="text-muted">Total Orders</h6>
                                    <h3 class="fw-bold m-0" id="stat-buyer-orders">0</h3>
                                </div>
                            </div>
                            <div class="col-sm-6 col-md-4">
                                <div class="glass-card p-4 text-center" style="border: 1px solid var(--border-color); border-radius: 16px;">
                                    <i class="bi bi-heart-fill text-danger fs-2 mb-2 d-block"></i>
                                    <h6 class="text-muted">Wishlist Items</h6>
                                    <h3 class="fw-bold m-0" id="stat-wish-count">0</h3>
                                </div>
                            </div>
                            <div class="col-sm-6 col-md-4 d-none" id="seller-listings-stat-card">
                                <div class="glass-card p-4 text-center" style="border: 1px solid var(--border-color); border-radius: 16px;">
                                    <i class="bi bi-shop text-success fs-2 mb-2 d-block"></i>
                                    <h6 class="text-muted">Your Listings</h6>
                                    <h3 class="fw-bold m-0" id="stat-seller-animals">0</h3>
                                </div>
                            </div>
                        </div>

                        <!-- Notification center -->
                        <div class="glass-card p-4" style="border: 1px solid var(--border-color); border-radius: 16px;">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold m-0"><i class="bi bi-bell-fill text-warning me-2"></i>Notifications</h5>
                                <button onclick="markAllNotificationsRead()" class="btn btn-link btn-sm text-decoration-none p-0">Clear All</button>
                            </div>
                            <div class="list-group list-group-flush" id="notifications-list">
                                <p class="text-muted m-0">No new notifications.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Tab: Edit Profile -->
                    <div class="tab-pane fade" id="panel-profile" role="tabpanel">
                        <h3 class="fw-bold mb-4">Edit Profile Info</h3>
                        <div class="glass-card p-4" style="border: 1px solid var(--border-color); border-radius: 16px;">
                            <form id="profile-edit-form" onsubmit="updateProfileInfo(event)">
                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" id="prof-name" class="form-control bg-transparent border-secondary text-color" required>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Phone Number</label>
                                        <input type="text" id="prof-phone" class="form-control bg-transparent border-secondary text-color" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Email Address (Read-only)</label>
                                        <input type="email" id="prof-email" class="form-control bg-transparent border-secondary text-color" disabled>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Delivery Address / Farm Location</label>
                                    <textarea id="prof-address" class="form-control bg-transparent border-secondary text-color" rows="3" required></textarea>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Change Password (Leave blank to keep current)</label>
                                    <input type="password" id="prof-password" class="form-control bg-transparent border-secondary text-color" placeholder="••••••••">
                                </div>
                                <button type="submit" class="btn btn-primary-custom px-4 rounded-3">Update Profile</button>
                            </form>
                        </div>
                    </div>

                    <!-- Tab: Orders History -->
                    <div class="tab-pane fade" id="panel-orders" role="tabpanel">
                        <h3 class="fw-bold mb-4">Your Orders</h3>
                        <div class="d-flex flex-column gap-3" id="orders-list-container">
                            <!-- Dynamically loaded -->
                        </div>
                    </div>

                    <!-- Tab: Wishlist -->
                    <div class="tab-pane fade" id="panel-wishlist" role="tabpanel">
                        <h3 class="fw-bold mb-4">My Wishlist</h3>
                        <div class="row g-3" id="wishlist-grid-container">
                            <!-- Loaded dynamically -->
                        </div>
                    </div>

                    <!-- Tab: Seller Panel -->
                    <div class="tab-pane fade" id="panel-seller" role="tabpanel">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="fw-bold m-0">Seller Listing Manager</h3>
                            <button class="btn btn-primary-custom btn-sm rounded-pill px-3" data-bs-toggle="collapse" data-bs-target="#addListingCollapse"><i class="bi bi-plus-circle me-1"></i>List New Animal</button>
                        </div>

                        <!-- Collapse: Add Listing Form -->
                        <div class="collapse mb-4" id="addListingCollapse">
                            <div class="glass-card p-4" style="border: 1px solid var(--border-color); border-radius: 16px;">
                                <h5 class="fw-bold mb-3" id="listing-form-title">List a New Animal</h5>
                                <form id="add-listing-form" onsubmit="submitListingForm(event)">
                                    <input type="hidden" id="listing-id" value="">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Animal Name</label>
                                            <input type="text" id="list-name" class="form-control bg-transparent border-secondary text-color" placeholder="e.g. Sahiwal Breed Cow" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Category</label>
                                            <select id="list-category" class="form-select bg-transparent border-secondary text-color" required>
                                                <!-- Dynamic categories -->
                                            </select>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Breed</label>
                                            <input type="text" id="list-breed" class="form-control bg-transparent border-secondary text-color" placeholder="e.g. Sahiwal" required>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Age (Months)</label>
                                            <input type="number" id="list-age" class="form-control bg-transparent border-secondary text-color" min="1" required>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Weight (Kg)</label>
                                            <input type="number" id="list-weight" step="0.1" class="form-control bg-transparent border-secondary text-color" required>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Price (INR)</label>
                                            <input type="number" id="list-price" class="form-control bg-transparent border-secondary text-color" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Location (City)</label>
                                            <input type="text" id="list-location" class="form-control bg-transparent border-secondary text-color" placeholder="e.g. Chennai" required>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label" id="list-main-img-label">Main Image</label>
                                            <input type="file" id="list-main-image" class="form-control bg-transparent border-secondary text-color" accept="image/*">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Additional Images (Optional)</label>
                                            <input type="file" id="list-images" class="form-control bg-transparent border-secondary text-color" accept="image/*" multiple>
                                        </div>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Listing Description / Vet Details</label>
                                        <textarea id="list-description" class="form-control bg-transparent border-secondary text-color" rows="3" placeholder="Describe health conditions, lactation yield (for cattle), vaccination logs..."></textarea>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary-custom px-4 rounded-3" id="listing-form-submit-btn">Publish Listing</button>
                                        <button type="button" onclick="cancelListingEdit()" class="btn btn-outline-secondary px-4 rounded-3">Cancel</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- Active listings list -->
                        <div class="row g-3" id="seller-listings-grid">
                            <!-- Loaded dynamically -->
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core App JS Scripts -->
    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/chatbot.js"></script>

    <!-- Dashboard UI Script -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "login.html";
                return;
            }

            // Sync user view
            const user = JSON.parse(localStorage.getItem("user") || "{}");
            document.getElementById("dash-side-name").innerText = user.name;
            document.getElementById("dash-side-role").innerText = user.role.toUpperCase();
            
            // Populate form
            document.getElementById("prof-name").value = user.name || "";
            document.getElementById("prof-phone").value = user.phone || "";
            document.getElementById("prof-email").value = user.email || "";
            document.getElementById("prof-address").value = user.address || "";

            // Adjust seller panel tab visibility
            if (user.role === 'seller' || user.role === 'both') {
                document.getElementById("tab-seller").classList.remove("d-none");
                document.getElementById("seller-listings-stat-card").classList.remove("d-none");
                loadCategoriesSelect();
                loadSellerListings();
            }

            // Fetch user profile data & notifications
            await loadProfileData();

            // Fetch wishlist items
            await loadWishlistItems();

            // Fetch order history
            await loadOrderHistory();
        });

        async function loadProfileData() {
            const res = await apiFetch("profile.php");
            if (res.status === "success") {
                // Render notifications
                const container = document.getElementById("notifications-list");
                container.innerHTML = "";
                
                if (res.notifications.length === 0) {
                    container.innerHTML = `<p class="text-muted m-0 p-3 text-center">No notifications yet.</p>`;
                    return;
                }

                res.notifications.forEach(notif => {
                    const div = document.createElement("div");
                    div.className = `list-group-item bg-transparent py-3 border-secondary d-flex justify-content-between align-items-start ${notif.is_read ? 'opacity-75' : 'fw-bold'}`;
                    div.innerHTML = `
                        <div>
                            <h6 class="m-0 text-color" style="font-size: 0.95rem;">${notif.title}</h6>
                            <small class="text-muted">${notif.message}</small>
                        </div>
                        <span style="font-size: 0.75rem;" class="text-muted">${new Date(notif.created_at).toLocaleDateString()}</span>
                    `;
                    container.appendChild(div);
                });
            }
        }

        async function markAllNotificationsRead() {
            const res = await apiFetch("profile.php", {
                method: "POST",
                body: JSON.stringify({ action: "read_notifications" })
            });
            if (res.status === "success") {
                showToast("Notifications cleared", "success");
                loadProfileData();
            }
        }

        async function updateProfileInfo(e) {
            e.preventDefault();
            const name = document.getElementById("prof-name").value;
            const phone = document.getElementById("prof-phone").value;
            const address = document.getElementById("prof-address").value;
            const password = document.getElementById("prof-password").value;

            const payload = { name, phone, address };
            if (password) payload.password = password;

            const res = await apiFetch("profile.php", {
                method: "POST",
                body: JSON.stringify(payload)
            });

            if (res.status === "success") {
                showToast("Profile updated successfully!", "success");
                // Update local storage user details
                localStorage.setItem("user", JSON.stringify(res.user));
                document.getElementById("dash-side-name").innerText = res.user.name;
                document.getElementById("prof-password").value = "";
            } else {
                showToast(res.message, "error");
            }
        }

        async function loadWishlistItems() {
            const container = document.getElementById("wishlist-grid-container");
            container.innerHTML = `<div class="text-center w-100 py-3"><div class="spinner-border text-primary" role="status"></div></div>`;

            const res = await apiFetch("wishlist.php");
            if (res.status === "success") {
                document.getElementById("stat-wish-count").innerText = res.wishlist.length;
                container.innerHTML = "";

                if (res.wishlist.length === 0) {
                    container.innerHTML = `<div class="text-center text-muted py-5 col-12">No animals added to your wishlist yet.</div>`;
                    return;
                }

                res.wishlist.forEach(item => {
                    const imgPath = item.main_image.startsWith("animal_") ? `../backend/uploads/${item.main_image}` : `https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=400`;
                    
                    const col = document.createElement("div");
                    col.className = "col-md-4";
                    col.innerHTML = `
                        <div class="glass-card animal-card h-100" style="border: 1px solid var(--border-color); border-radius: 16px;">
                            <div class="animal-image-wrapper" style="height: 150px;">
                                <img src="${imgPath}" alt="${item.name}">
                            </div>
                            <div class="p-3 text-center text-sm-start">
                                <h6 class="fw-bold m-0 mb-1">${item.name}</h6>
                                <p class="text-primary fw-bold mb-2">${formatPrice(item.price)}</p>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <a href="animal-details.html?id=${item.animal_id}" class="btn btn-outline-primary btn-sm w-100 rounded-3">Details</a>
                                    </div>
                                    <div class="col-6">
                                        <button onclick="removeFromWishlist(${item.animal_id})" class="btn btn-danger btn-sm w-100 rounded-3"><i class="bi bi-trash"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(col);
                });
            }
        }

        async function removeFromWishlist(id) {
            const res = await apiFetch("wishlist.php", {
                method: "POST",
                body: JSON.stringify({ animal_id: id })
            });
            if (res.status === "removed") {
                showToast("Removed from wishlist.", "success");
                loadWishlistItems();
            }
        }

        async function loadOrderHistory() {
            const container = document.getElementById("orders-list-container");
            container.innerHTML = `<div class="text-center py-3"><div class="spinner-border text-primary" role="status"></div></div>`;

            const res = await apiFetch("order.php");
            if (res.status === "success") {
                document.getElementById("stat-buyer-orders").innerText = res.orders.length;
                container.innerHTML = "";

                if (res.orders.length === 0) {
                    container.innerHTML = `<p class="text-muted text-center py-5">You haven't ordered any animals yet.</p>`;
                    return;
                }

                res.orders.forEach(order => {
                    const card = document.createElement("div");
                    card.className = "glass-card p-4";
                    card.style.border = "1px solid var(--border-color)";
                    card.style.borderRadius = "16px";
                    
                    let badgeClass = "bg-warning";
                    if (order.status === 'delivered') badgeClass = "bg-success";
                    if (order.status === 'cancelled') badgeClass = "bg-danger";

                    card.innerHTML = `
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-3">
                            <div>
                                <h6 class="fw-bold m-0">Order #${order.id}</h6>
                                <small class="text-muted">Date: ${new Date(order.created_at).toLocaleDateString()} | Method: ${order.payment_method}</small>
                            </div>
                            <div class="d-flex align-items-center gap-2 mt-2 mt-sm-0">
                                <span class="badge ${badgeClass} text-uppercase px-3 py-2 rounded-pill">${order.status}</span>
                                <span class="fw-bold fs-5 text-primary">${formatPrice(order.total_amount)}</span>
                            </div>
                        </div>
                        <div class="collapse" id="trackCollapse-${order.id}">
                            <div class="mt-4 pt-3 border-top border-secondary">
                                <h6 class="fw-bold mb-3">Order Tracking Status</h6>
                                ${order.tracking_number ? `<p class="text-muted" style="font-size: 0.9rem;">Tracking ID: <strong>${order.tracking_number}</strong></p>` : ''}
                                <div class="timeline">
                                    <div class="timeline-item ${order.payment_status === 'paid' ? 'active' : ''}">
                                        <div class="timeline-marker"></div>
                                        <h6 class="fw-bold m-0">Payment Confirmed</h6>
                                        <small class="text-muted">Payment received & validated</small>
                                    </div>
                                    <div class="timeline-item ${order.status !== 'pending' && order.status !== 'cancelled' ? 'active' : ''}">
                                        <div class="timeline-marker"></div>
                                        <h6 class="fw-bold m-0">Processing & Vet Check</h6>
                                        <small class="text-muted">Verifying health certifications and transit prep</small>
                                    </div>
                                    <div class="timeline-item ${order.status === 'shipped' || order.status === 'delivered' ? 'active' : ''}">
                                        <div class="timeline-marker"></div>
                                        <h6 class="fw-bold m-0">Shipped</h6>
                                        <small class="text-muted">Animal is in transit to location</small>
                                    </div>
                                    <div class="timeline-item ${order.status === 'delivered' ? 'active' : ''}">
                                        <div class="timeline-marker"></div>
                                        <h6 class="fw-bold m-0">Delivered</h6>
                                        <small class="text-muted">Delivered and signed off by buyer</small>
                                    </div>
                                </div>
                                ${order.status === 'pending' || order.status === 'processing' ? `
                                    <button onclick="cancelOrder(${order.id})" class="btn btn-outline-danger btn-sm rounded-pill px-3 mt-3">Cancel Order</button>
                                ` : ''}
                            </div>
                        </div>
                        <button class="btn btn-outline-primary btn-sm rounded-pill px-3 mt-2 w-100" data-bs-toggle="collapse" data-bs-target="#trackCollapse-${order.id}"><i class="bi bi-geo-fill me-1"></i>Track / Details</button>
                    `;
                    container.appendChild(card);
                });
            }
        }

        async function cancelOrder(id) {
            if (confirm("Are you sure you want to cancel this order?")) {
                const res = await apiFetch(`order.php?id=${id}`, {
                    method: "DELETE"
                });
                if (res.status === "success") {
                    showToast("Order cancelled successfully", "success");
                    loadOrderHistory();
                    loadProfileData();
                } else {
                    showToast(res.message, "error");
                }
            }
        }

        // Seller panel functions
        async function loadCategoriesSelect() {
            const select = document.getElementById("list-category");
            const data = await apiFetch("categories.php");
            if (data.status === "success") {
                select.innerHTML = "";
                data.categories.forEach(cat => {
                    const opt = document.createElement("option");
                    opt.value = cat.id;
                    opt.innerText = cat.name;
                    select.appendChild(opt);
                });
            }
        }

        async function loadSellerListings() {
            const container = document.getElementById("seller-listings-grid");
            container.innerHTML = `<div class="text-center w-100 py-3"><div class="spinner-border text-primary" role="status"></div></div>`;

            const res = await apiFetch("animals.php?seller=true");
            if (res.status === "success") {
                document.getElementById("stat-seller-animals").innerText = res.animals.length;
                container.innerHTML = "";

                if (res.animals.length === 0) {
                    container.innerHTML = `<div class="text-center text-muted py-5 col-12">You haven't listed any animals yet.</div>`;
                    return;
                }

                res.animals.forEach(animal => {
                    const imgPath = animal.main_image.startsWith("animal_") ? `../backend/uploads/${animal.main_image}` : `https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=400`;
                    
                    const col = document.createElement("div");
                    col.className = "col-md-4";
                    col.innerHTML = `
                        <div class="glass-card animal-card h-100" style="border: 1px solid var(--border-color); border-radius: 16px;">
                            <div class="animal-image-wrapper" style="height: 150px;">
                                <img src="${imgPath}" alt="${animal.name}">
                                <span class="badge bg-secondary position-absolute bottom-0 start-0 m-2 text-uppercase">${animal.status}</span>
                            </div>
                            <div class="p-3">
                                <h6 class="fw-bold m-0">${animal.name}</h6>
                                <p class="text-primary fw-bold mb-2">${formatPrice(animal.price)}</p>
                                <div class="row g-1">
                                    <div class="col-6">
                                        <button onclick="editListing(${JSON.stringify(animal).replace(/"/g, '&quot;')})" class="btn btn-outline-primary btn-sm w-100 rounded-3">Edit</button>
                                    </div>
                                    <div class="col-6">
                                        <button onclick="deleteListing(${animal.id})" class="btn btn-danger btn-sm w-100 rounded-3"><i class="bi bi-trash"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(col);
                });
            }
        }

        async function submitListingForm(e) {
            e.preventDefault();
            const form = document.getElementById("add-listing-form");
            const submitBtn = document.getElementById("listing-form-submit-btn");
            submitBtn.disabled = true;

            const formData = new FormData();
            const name = document.getElementById("list-name").value;
            const categoryId = document.getElementById("list-category").value;
            const breed = document.getElementById("list-breed").value;
            const age = document.getElementById("list-age").value;
            const weight = document.getElementById("list-weight").value;
            const price = document.getElementById("list-price").value;
            const location = document.getElementById("list-location").value;
            const description = document.getElementById("list-description").value;
            const mainImg = document.getElementById("list-main-image").files[0];
            const listingId = document.getElementById("listing-id").value;

            formData.append("name", name);
            formData.append("category_id", categoryId);
            formData.append("breed", breed);
            formData.append("age_months", age);
            formData.append("weight_kg", weight);
            formData.append("price", price);
            formData.append("location", location);
            formData.append("description", description);

            if (mainImg) {
                formData.append("main_image", mainImg);
            }

            // Append multiple additional files
            const addImgs = document.getElementById("list-images").files;
            for (let i = 0; i < addImgs.length; i++) {
                formData.append("images[]", addImgs[i]);
            }

            let endpoint = "animals.php";
            let options = {
                method: "POST",
                body: formData,
                headers: {} // API client will auto inject Bearer token
            };

            // Workaround for PHP multipart form PUT simulation
            if (listingId) {
                formData.append("_method", "PUT");
                formData.append("id", listingId);
            }

            const res = await apiFetch(endpoint, options);
            submitBtn.disabled = false;

            if (res.status === "success") {
                showToast(res.message, "success");
                form.reset();
                cancelListingEdit(); // Reset form states
                loadSellerListings();
                
                // Hide collapse
                const collapseEl = document.getElementById("addListingCollapse");
                const bsCollapse = bootstrap.Collapse.getInstance(collapseEl);
                if (bsCollapse) bsCollapse.hide();
            } else {
                showToast(res.message, "error");
            }
        }

        function editListing(animal) {
            document.getElementById("listing-id").value = animal.id;
            document.getElementById("list-name").value = animal.name;
            document.getElementById("list-category").value = animal.category_id;
            document.getElementById("list-breed").value = animal.breed;
            document.getElementById("list-age").value = animal.age_months;
            document.getElementById("list-weight").value = animal.weight_kg;
            document.getElementById("list-price").value = animal.price;
            document.getElementById("list-location").value = animal.location;
            document.getElementById("list-description").value = animal.description || "";
            
            document.getElementById("listing-form-title").innerText = "Edit Animal Listing";
            document.getElementById("listing-form-submit-btn").innerText = "Update Listing";
            document.getElementById("list-main-img-label").innerText = "Main Image (Leave blank to keep current)";

            // Show listing collapse
            const collapseEl = document.getElementById("addListingCollapse");
            const bsCollapse = new bootstrap.Collapse(collapseEl, { toggle: false });
            bsCollapse.show();
            
            // Scroll to form
            collapseEl.scrollIntoView({ behavior: 'smooth' });
        }

        function cancelListingEdit() {
            document.getElementById("listing-id").value = "";
            document.getElementById("add-listing-form").reset();
            document.getElementById("listing-form-title").innerText = "List a New Animal";
            document.getElementById("listing-form-submit-btn").innerText = "Publish Listing";
            document.getElementById("list-main-img-label").innerText = "Main Image";
        }

        async function deleteListing(id) {
            if (confirm("Are you sure you want to delete this listing permanently?")) {
                const res = await apiFetch(`animals.php?id=${id}`, {
                    method: "DELETE"
                });
                if (res.status === "success") {
                    showToast("Listing deleted", "success");
                    loadSellerListings();
                } else {
                    showToast(res.message, "error");
                }
            }
        }
    </script>
</body>
</html>
